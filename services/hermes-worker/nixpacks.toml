# Nixpacks build config for Hermes Worker (Railway).
# Node.js 22 Fastify HTTP server.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm", "git"]

[phases.install]
cmds = [
  "pnpm install --no-frozen-lockfile",
  "pnpm --filter @hypermyths/hermes-worker build"
]

[start]
cmd = "pnpm --filter @hypermyths/hermes-worker start"
